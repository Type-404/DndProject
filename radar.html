<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar - Dice & Discoveries</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <link rel="stylesheet" href="radar.css">
</head>

<body>

  <!-- Background Effects -->
  <div class="bg-effects-wrapper">
    <div class="bg-effect-1 animate-pulse-glow"></div>
  </div>

  <!-- Navbar -->
  <header>
    <nav class="glass-strong nav-container">
      <div class="w-full sm:w-auto flex justify-between items-center" style="flex: 1;">
        <a href="index.html" class="nav-logo group">
          <i data-lucide="dices"></i>
          <span>Dice & Discoveries</span>
        </a>
        <button id="mobile-menu-btn" class="mobile-menu-btn md:hidden" aria-label="Toggle Menu">
          <i data-lucide="menu"></i>
        </button>
      </div>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="rules.html" class="nav-link">Rules</a></li>
        <li><a href="journey.html" class="nav-link">Journey</a></li>
        <li><a href="/puzzel/game.html" class="nav-link"><i data-lucide="gamepad-2" style="width: 16px; height: 16px;"></i> Game</a></li>
        <li><a href="radar.html" class="nav-link active">Radar</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div id="radar-content" class="max-w-4xl mx-auto space-y-12">
      <div class="text-center mb-12 animate-fade-in-up">
        <h1 class="text-4xl md:text-5xl font-bold mb-4">Radar</h1>
      </div>

      <section class="flex flex-col items-center justify-center animate-fade-in-up mb-12 relative">

        <div id="ui-panel" class="glass rounded-xl p-4 mb-6 z-10 w-full max-w-sm text-center">
          <h3 class="font-semibold text-primary mb-2">Radar Settings</h3>
          <div class="pt-2 border-t border-primary/20" style="border-top: 1px solid rgba(0, 255, 255, 0.2);">
            <label class="text-sm">Manual Rotation(Testing): <span id="headingVal">0</span>°</label><br>
            <input type="range" id="manualHeading" min="0" max="360" value="0" class="w-full mt-2 cursor-pointer">
          </div>
        </div>

        <div id="tracking-radar">
          <div class="track-crosshair"></div>
          <div id="track-sweep"></div>

          <div id="radar-nodes-container"
            style="position: absolute; inset: 0; width: 100%; height: 100%; transform-origin: center;">
          </div>

          <div class="track-pulse"></div>
          <div id="track-player"></div>
        </div>

      </section>
    </div>

    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="script.js"></script>

  <script src="radar.js"></script>
</body>

</html>
