<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose Your Character — Dice & Discoveries</title>
  <meta name="description" content="Select your character for Dice & Discoveries: A STEM Adventure Game.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="character.css">
</head>
<body class="bg-grid">

  <!-- Background Effects -->
  <div class="bg-effects-wrapper">
    <div class="bg-effect-1 animate-pulse-glow"></div>
    <div class="bg-effect-2 animate-float"></div>
  </div>

  <!-- Navbar -->
  <header>
    <nav class="glass-strong nav-container">
      <div class="w-full sm:w-auto flex justify-between items-center" style="flex: 1;">
        <a href="index.html" class="nav-logo group">
          <i data-lucide="dices"></i>
          <span>Dice & Discoveries</span>
        </a>
        <button id="mobile-menu-btn" class="mobile-menu-btn md:hidden" aria-label="Toggle Menu">
          <i data-lucide="menu"></i>
        </button>
      </div>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="rules.html" class="nav-link">Rules</a></li>
        <li><a href="game.html" class="nav-link"><i data-lucide="gamepad-2" style="width: 16px; height: 16px;"></i> Game</a></li>
        <li>
          <a href="radar.html" class="nav-link" data-protected="radar">
            <i data-lucide="lock" class="w-3 h-3 lock-icon hidden" style="width: 12px;"></i> Radar
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <main>
    <div id="app" class="char-app">

      <!-- Screen 1: Character Selection -->
      <section id="screen-character" class="char-screen active">
        <div class="char-screen-header animate-fade-in-up">
          <div class="char-badge glass">
            <span class="hero-badge-dot"></span>
            <span>CORE-X PROTOCOL ACTIVE</span>
          </div>
          <h1 class="char-page-title">Choose Your <span class="text-primary text-glow">Character</span></h1>
          <p class="char-page-sub">Select a STEM role to begin your mission.</p>
        </div>
        <div class="char-grid" id="character-grid">
          <!-- Character cards injected by JS -->
        </div>
      </section>

      <!-- Screen 2: Background Selection -->
      <section id="screen-background" class="char-screen">
        <div class="char-screen-header">
          <h1 class="char-page-title">Choose Your <span class="text-primary text-glow">Background</span></h1>
          <p id="character-selected-name" class="char-selected-info">CHARACTER</p>
        </div>
        <div class="char-bg-grid" id="background-grid">
          <!-- Background cards injected by JS -->
        </div>
        <div class="char-actions">
          <button class="btn btn-outline-cyan btn-lg" onclick="app.goBack('screen-character')">
            <i data-lucide="arrow-left" style="width:18px;height:18px;"></i> Back
          </button>
          <button class="btn btn-lg glow-md" id="btn-confirm-background" disabled onclick="app.confirmBackground()">
            Confirm Background <i data-lucide="check" style="width:18px;height:18px;"></i>
          </button>
        </div>
      </section>

      <!-- Screen 3: Summary -->
      <section id="screen-summary" class="char-screen">
        <div class="char-screen-header">
          <h1 class="char-page-title">Mission <span class="text-primary text-glow">Briefing</span></h1>
          <p class="char-page-sub">Initialization Complete</p>
        </div>
        <div class="char-summary-wrap">
          <div class="char-summary-content glass-strong" id="summary-content">
            <!-- Summary injected by JS -->
          </div>
          <div class="char-actions char-actions--center">
            <button class="btn btn-outline-cyan btn-lg" onclick="app.goBack('screen-background')">
              <i data-lucide="arrow-left" style="width:18px;height:18px;"></i> Reconfigure
            </button>
            <a href="rules.html" class="btn btn-lg glow-md char-start-btn" id="btn-start-game">
              <i data-lucide="rocket" style="width:20px;height:20px;"></i> Start Game
            </a>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="script.js"></script>
  <script src="character.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
