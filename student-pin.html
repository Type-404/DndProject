<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter Game PIN — Dice & Discoveries</title>
  <meta name="description" content="Enter your game PIN to join a Dice & Discoveries session.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-grid">

  <!-- Background Effects -->
  <div class="bg-effects-wrapper">
    <div class="bg-effect-1 animate-pulse-glow"></div>
    <div class="bg-effect-2 animate-float"></div>
  </div>

  <!-- Navbar -->
  <header>
    <nav class="glass-strong nav-container">
      <div class="w-full sm:w-auto flex justify-between items-center" style="flex: 1;">
        <a href="index.html" class="nav-logo group">
          <i data-lucide="dices"></i>
          <span>Dice & Discoveries</span>
        </a>
        <button id="mobile-menu-btn" class="mobile-menu-btn md:hidden" aria-label="Toggle Menu">
          <i data-lucide="menu"></i>
        </button>
      </div>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="rules.html" class="nav-link">Rules</a></li>
        <li><a href="game.html" class="nav-link"><i data-lucide="gamepad-2" style="width: 16px; height: 16px;"></i> Game</a></li>
        <li>
          <a href="radar.html" class="nav-link" data-protected="radar">
            <i data-lucide="lock" class="w-3 h-3 lock-icon hidden" style="width: 12px;"></i> Radar
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero-section" id="pin-section" style="min-height: 70vh;">
      <div class="hero-glow"></div>

      <div class="home-container hero-inner" style="max-width: 480px;">

        <div class="hero-badge glass animate-fade-in-up">
          <span class="hero-badge-dot"></span>
          <span>Student Access</span>
        </div>

        <h1 class="animate-fade-in-up" style="font-size: clamp(1.8rem, 4vw, 2.5rem); font-weight: 800; margin-bottom: 0.5rem; animation-delay:.1s">
          Enter Game <span class="text-primary text-glow">PIN</span>
        </h1>

        <p class="hero-desc animate-fade-in-up" style="animation-delay:.15s; margin-bottom: 2rem;">
          Enter the PIN given by your teacher to join the session.
        </p>

        <form id="pin-form" class="animate-fade-in-up" style="animation-delay:.25s; width: 100%;" autocomplete="off">

          <input
            type="text"
            id="pin-input"
            class="input mb-4"
            placeholder="Enter PIN..."
            style="text-align: center; font-size: 1.5rem; font-weight: 700; padding: 1.1rem; letter-spacing: 4px;"
            autocomplete="off"
            maxlength="10"
          >

          <div id="pin-error" class="hidden mb-4 text-destructive text-sm flex items-center justify-center gap-2">
            <i data-lucide="x-circle" style="width: 16px;"></i> Please enter a valid PIN.
          </div>

          <button type="submit" class="btn btn-lg glow-md w-full hover-glow-btn" style="font-size: 1.1rem; padding: 1rem;">
            <i data-lucide="arrow-right" style="width:20px;height:20px;"></i>
            Continue
          </button>

        </form>

        <a href="index.html" class="animate-fade-in-up" style="animation-delay:.35s; display: inline-flex; align-items: center; gap: 0.4rem; margin-top: 1.5rem; font-size: 0.85rem; color: var(--muted-foreground); transition: color 0.2s;">
          <i data-lucide="arrow-left" style="width:14px;height:14px;"></i> Back to Home
        </a>

      </div>
    </section>
  </main>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="script.js"></script>
  <script>
    lucide.createIcons();

    const pinForm = document.getElementById('pin-form');
    const pinInput = document.getElementById('pin-input');
    const pinError = document.getElementById('pin-error');

    pinForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const pin = pinInput.value.trim();

      if (!pin) {
        pinError.classList.remove('hidden');
        pinInput.focus();
        return;
      }

      pinError.classList.add('hidden');
      localStorage.setItem('gamePin', pin);
      window.location.href = 'character.html';
    });

    pinInput.addEventListener('input', () => {
      if (pinError && !pinError.classList.contains('hidden')) {
        pinError.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
