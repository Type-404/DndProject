<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Role Overview — Dice & Discoveries</title>
  <meta name="description" content="Your STEM role briefing for Dice & Discoveries.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="character.css">
</head>
<body class="bg-grid">

  <div class="bg-effects-wrapper">
    <div class="bg-effect-1 animate-pulse-glow"></div>
    <div class="bg-effect-2 animate-float"></div>
  </div>

  <header>
    <nav class="glass-strong nav-container">
      <div class="w-full sm:w-auto flex justify-between items-center" style="flex: 1;">
        <a href="index.html" class="nav-logo group">
          <i data-lucide="dices"></i>
          <span>Dice & Discoveries</span>
        </a>
        <button id="mobile-menu-btn" class="mobile-menu-btn md:hidden" aria-label="Toggle Menu">
          <i data-lucide="menu"></i>
        </button>
      </div>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="rules.html" class="nav-link">Rules</a></li>
        <li>
          <a href="radar.html" class="nav-link" data-protected="radar">
            <i data-lucide="lock" class="w-3 h-3 lock-icon hidden" style="width: 12px;"></i> Radar
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <main>
    <div id="role-overview-app" class="char-app">
      <section class="char-screen active" style="padding-top: 1rem;">
        <div class="char-screen-header animate-fade-in-up">
          <div class="char-badge glass">
            <span class="hero-badge-dot"></span>
            <span>MISSION DOSSIER</span>
          </div>
          <h1 class="char-page-title">Role <span class="text-primary text-glow">Overview</span></h1>
          <p class="char-page-sub">Review your assignment before continuing.</p>
        </div>
        <div class="char-summary-wrap">
          <div class="char-summary-content glass-strong" id="role-overview-content">
            <!-- Filled by script -->
          </div>
          <div class="char-actions char-actions--center">
            <a href="rules.html" class="btn btn-lg glow-md char-start-btn" id="btn-continue-adventure">
              <i data-lucide="rocket" style="width:20px;height:20px;"></i> Continue Adventure
            </a>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="script.js"></script>
  <script>
    (function () {
      function esc(s) {
        return String(s == null ? "" : s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      var content = document.getElementById("role-overview-content");
      var party = null;
      try {
        party = JSON.parse(localStorage.getItem("questAcademy_studentParty") || "null");
      } catch (e) {
        party = null;
      }
      if (!party || !party.character || !party.background) {
        window.location.replace("character.html");
        return;
      }
      if (party.character.role === "Programmer") {
        window.location.replace("game.html");
        return;
      }

      var char = party.character;
      var bg = party.background;
      content.innerHTML =
        '<div class="char-summary-header">' +
          '<div class="char-summary-title">' +
            '<h2>' + esc(char.name) + '</h2>' +
            '<p>' + esc(char.role) + '</p>' +
          '</div>' +
          '<div class="char-summary-hp">' + esc(char.hp) + ' <span>HP</span></div>' +
        '</div>' +
        '<div class="char-summary-details">' +
          '<div class="char-detail-section"><h4>Core Ability</h4><p>' + esc(char.ability) + '</p></div>' +
          '<div class="char-detail-section"><h4>Selected Background</h4><p>' + esc(bg.title) + '</p></div>' +
          '<div class="char-detail-section"><h4>Trait</h4><p>' + esc(bg.trait) + '</p></div>' +
          '<div class="char-detail-section"><h4>Background Bonus</h4><p>' + esc(bg.ability) + '</p></div>' +
          '<div class="char-detail-section char-story-section"><h4>Mission Briefing</h4><p>&ldquo;' + esc(bg.story) + '&rdquo;</p></div>' +
        '</div>';

      if (typeof lucide !== "undefined") lucide.createIcons();
    })();
  </script>
</body>
</html>
